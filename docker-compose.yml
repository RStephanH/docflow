services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend
    expose:
      - "5173"        # ← plus de ports: , exposé uniquement via Nginx
    depends_on:
      - backend

  backend:
    build: ./backend
    expose:
      - "3000"        # ← plus de ports: , exposé uniquement via Nginx
    environment:
      - MONGODB_URI=mongodb://mongo:27017/pdfgen
      - NODE_ENV=production
      - JWT_SECRET=docflow-secret-prod
      - LOG_LEVEL=info
    depends_on:
      - mongo
    volumes:
      - ./backend/src:/app/src

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: